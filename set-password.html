<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Set Your Password — SheauJia Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a2e;
      --gold: #c9a84c;
      --cream: #faf7f2;
      --muted: #7a7a8a;
      --error: #c0392b;
      --success: #2d6a4f;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .staff-lines {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 0; opacity: 0.04;
    }
    .staff-lines span { position: absolute; left: 0; right: 0; height: 1px; background: var(--ink); }

    .bg-ornament {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .bg-ornament::before {
      content: ''; position: absolute; top: -200px; right: -200px;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
    }

    .card {
      position: relative; z-index: 1;
      background: white; border: 1px solid rgba(201,168,76,0.25);
      border-radius: 4px; padding: 52px 48px 44px;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(26,26,46,0.08), 0 4px 16px rgba(26,26,46,0.04);
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand { text-align: center; margin-bottom: 36px; }
    .brand-icon { width: 48px; height: 48px; margin: 0 auto 16px; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 600; color: var(--ink); }
    .brand-sub { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 6px; }

    .divider { display: flex; align-items: center; gap: 12px; margin: 0 0 28px; }
    .divider-line { flex: 1; height: 1px; background: rgba(201,168,76,0.3); }
    .divider-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); }

    .step-label {
      font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 8px; font-weight: 500;
    }

    .step-title {
      font-family: 'Cormorant Garamond', serif; font-size: 1.3rem;
      font-weight: 600; color: var(--ink); margin-bottom: 6px;
    }

    .step-desc { font-size: 0.83rem; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }

    label {
      display: block; font-size: 0.72rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }

    input[type="password"], input[type="email"] {
      width: 100%; padding: 12px 14px; border: 1px solid #e0ddd8;
      border-radius: 3px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      color: var(--ink); background: #fdfcfa; transition: border-color 0.2s, box-shadow 0.2s;
      outline: none; margin-bottom: 20px;
    }
    input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }

    .password-hint {
      font-size: 0.75rem; color: var(--muted); margin-top: -14px;
      margin-bottom: 20px; line-height: 1.4;
    }

    .btn {
      width: 100%; padding: 13px; background: var(--ink); color: white;
      border: none; border-radius: 3px; font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: background 0.2s; margin-top: 4px;
    }
    .btn:hover { background: #2d2d4a; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: #fdf0ef; border: 1px solid #f5c6c2; color: var(--error);
      padding: 10px 14px; border-radius: 3px; font-size: 0.83rem;
      margin-bottom: 16px; display: none;
    }
    .error-msg.show { display: block; }

    .success-msg {
      text-align: center; padding: 20px 0;
    }
    .success-icon {
      width: 48px; height: 48px; background: #d8f3dc; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .success-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; color: var(--ink); margin-bottom: 8px; }
    .success-desc { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; }

    /* Forgot password mode */
    .back-link {
      display: block; text-align: center; margin-top: 20px;
      font-size: 0.78rem; color: var(--muted); cursor: pointer;
      text-decoration: underline; text-underline-offset: 3px;
    }
    .back-link:hover { color: var(--ink); }
  </style>
</head>
<body>

<div class="bg-ornament"></div>
<div class="staff-lines" id="staffLines"></div>

<div class="card" id="mainCard">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="23" stroke="#c9a84c" stroke-width="1.5"/>
        <path d="M18 32V18l16-4v14" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="15" cy="32" r="3" fill="#c9a84c"/>
        <circle cx="31" cy="28" r="3" fill="#c9a84c"/>
        <line x1="18" y1="23" x2="34" y2="19" stroke="#c9a84c" stroke-width="1.2"/>
      </svg>
    </div>
    <h1>SheauJia Studio</h1>
    <div class="brand-sub">Lesson Scheduler</div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-dot"></div>
    <div class="divider-line"></div>
  </div>

  <div id="cardContent">
    <!-- Content injected by JS depending on mode -->
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  // Draw staff lines
  const staffLinesEl = document.getElementById('staffLines');
  for (let i = 0; i < 30; i++) {
    const line = document.createElement('span');
    line.style.top = (i * 36 + 20) + 'px';
    staffLinesEl.appendChild(line);
  }

  const { createClient } = window.supabase;
  const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Detect mode from URL hash
  // Supabase puts #access_token=... in the URL after email link click
  const hash = window.location.hash;
  const params = new URLSearchParams(hash.replace('#', '?'));
  const accessToken = params.get('access_token');
  const refreshToken = params.get('refresh_token');
  const type = params.get('type'); // 'invite' or 'recovery'

  const content = document.getElementById('cardContent');

  async function init() {
    if (accessToken && (type === 'invite' || type === 'recovery' || type === 'signup')) {
      // Set the session from the token in the URL
      await supabaseClient.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
      showSetPasswordForm();
    } else {
      // No token — show forgot password form
      showForgotPasswordForm();
    }
  }

  function showSetPasswordForm() {
    content.innerHTML = `
      <div class="step-label">Welcome</div>
      <div class="step-title">Set your password</div>
      <div class="step-desc">Choose a password to secure your account. You'll use this to log in to the scheduler going forward.</div>
      <div class="error-msg" id="errorMsg"></div>
      <label for="newPassword">New Password</label>
      <input type="password" id="newPassword" placeholder="At least 8 characters"/>
      <div class="password-hint">Use at least 8 characters with a mix of letters and numbers.</div>
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Re-enter your password"/>
      <button class="btn" id="setBtn" onclick="setPassword()">Set Password & Continue</button>
    `;
  }

  function showForgotPasswordForm() {
    content.innerHTML = `
      <div class="step-label">Password Reset</div>
      <div class="step-title">Forgot your password?</div>
      <div class="step-desc">Enter your email address and we'll send you a link to set a new password.</div>
      <div class="error-msg" id="errorMsg"></div>
      <label for="resetEmail">Email Address</label>
      <input type="email" id="resetEmail" placeholder="your@email.com"/>
      <button class="btn" id="resetBtn" onclick="sendReset()">Send Reset Link</button>
      <a class="back-link" onclick="window.location.href='index.html'">← Back to login</a>
    `;
  }

  async function setPassword() {
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const btn = document.getElementById('setBtn');
    const err = document.getElementById('errorMsg');

    err.classList.remove('show');

    if (newPassword.length < 8) {
      err.textContent = 'Password must be at least 8 characters.';
      err.classList.add('show'); return;
    }

    if (newPassword !== confirmPassword) {
      err.textContent = 'Passwords do not match.';
      err.classList.add('show'); return;
    }

    btn.disabled = true;
    btn.textContent = 'Setting password…';

    const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

    if (error) {
      err.textContent = 'Something went wrong: ' + error.message;
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Set Password & Continue';
      return;
    }

    // Show success then redirect
    content.innerHTML = `
      <div class="success-msg">
        <div class="success-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M5 13l4 4L19 7" stroke="#2d6a4f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="success-title">Password set!</div>
        <div class="success-desc">Taking you to your schedule…</div>
      </div>`;

    setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
  }

  async function sendReset() {
    const email = document.getElementById('resetEmail').value.trim();
    const btn = document.getElementById('resetBtn');
    const err = document.getElementById('errorMsg');

    err.classList.remove('show');

    if (!email) {
      err.textContent = 'Please enter your email address.';
      err.classList.add('show'); return;
    }

    btn.disabled = true;
    btn.textContent = 'Sending…';

    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://sheaujia-studio.github.io/scheduler/set-password.html'
    });

    if (error) {
      err.textContent = 'Something went wrong. Please try again.';
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Send Reset Link';
      return;
    }

    content.innerHTML = `
      <div class="success-msg">
        <div class="success-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M5 13l4 4L19 7" stroke="#2d6a4f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="success-title">Check your email</div>
        <div class="success-desc">We've sent a password reset link to <strong>${email}</strong>. Click the link in the email to set your password.</div>
        <a class="back-link" onclick="window.location.href='index.html'">← Back to login</a>
      </div>`;
  }

  init();
</script>
</body>
</html>
